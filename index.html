<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard - Live</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .last-update {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .sentiment-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .sentiment-label {
            font-size: 1.2em;
            color: #636e72;
            margin-bottom: 15px;
        }
        
        .sentiment-value {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .indicator-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        
        .indicator-card:hover {
            transform: translateY(-5px);
        }
        
        .indicator-name {
            font-size: 0.9em;
            color: #636e72;
            margin-bottom: 10px;
        }
        
        .indicator-value {
            font-size: 2em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        
        .indicator-change {
            font-size: 1em;
            font-weight: bold;
        }
        
        .positive {
            color: #00b894;
        }
        
        .negative {
            color: #e17055;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 40px;
        }
        
        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Trading Dashboard</h1>
            <div class="last-update" id="lastUpdate">Caricamento...</div>
        </header>
        
        <div id="loading" class="loading">
            ⏳ Caricamento dati di mercato...
        </div>
        
        <div id="dashboard" style="display: none;">
            <div class="sentiment-card">
                <div class="sentiment-label">MARKET SENTIMENT</div>
                <div class="sentiment-value" id="sentiment">-</div>
            </div>
            
            <div class="indicators-grid">
                <div class="indicator-card">
                    <div class="indicator-name">VIX (Volatility Index)</div>
                    <div class="indicator-value" id="vix-value">-</div>
                    <div class="indicator-change" id="vix-change">-</div>
                </div>
                
                <div class="indicator-card">
                    <div class="indicator-name">S&P 500 (SPY)</div>
                    <div class="indicator-value" id="spy-value">-</div>
                    <div class="indicator-change" id="spy-change">-</div>
                </div>
                
                <div class="indicator-card">
                    <div class="indicator-name">Gold</div>
                    <div class="indicator-value" id="gold-value">-</div>
                </div>
                
                <div class="indicator-card">
                    <div class="indicator-name">USD Index (DXY)</div>
                    <div class="indicator-value" id="dxy-value">-</div>
                </div>
                
                <div class="indicator-card">
                    <div class="indicator-name">EUR/USD</div>
                    <div class="indicator-value" id="eurusd-value">-</div>
                </div>
                
                <div class="indicator-card">
                    <div class="indicator-name">Bitcoin</div>
                    <div class="indicator-value" id="btc-value">-</div>
                </div>
            </div>
        </div>
        
        <footer>
            <p>Dati aggiornati automaticamente ogni ora via GitHub Actions</p>
            <p>Powered by Python + yfinance</p>
        </footer>
    </div>
    
    <script>
        async function loadData() {
            try {
                const response = await fetch('data/market_data.json');
                const data = await response.json();
                
                // Nascondi loading, mostra dashboard
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                
                // Update last update time
                document.getElementById('lastUpdate').textContent = 
                    `Ultimo aggiornamento: ${data.last_update}`;
                
                // Update sentiment
                const sentimentEl = document.getElementById('sentiment');
                sentimentEl.textContent = data.sentiment;
                sentimentEl.style.color = data.sentiment_color;
                
                // Update VIX
                document.getElementById('vix-value').textContent = data.indicators.vix.value;
                const vixChange = document.getElementById('vix-change');
                vixChange.textContent = `${data.indicators.vix.change > 0 ? '+' : ''}${data.indicators.vix.change}%`;
                vixChange.className = data.indicators.vix.change > 0 ? 'indicator-change positive' : 'indicator-change negative';
                
                // Update SPY
                document.getElementById('spy-value').textContent = `$${data.indicators.spy.value}`;
                const spyChange = document.getElementById('spy-change');
                spyChange.textContent = `${data.indicators.spy.change > 0 ? '+' : ''}${data.indicators.spy.change}%`;
                spyChange.className = data.indicators.spy.change > 0 ? 'indicator-change positive' : 'indicator-change negative';
                
                // Update Gold
                document.getElementById('gold-value').textContent = `$${data.indicators.gold.value}`;
                
                // Update DXY
                document.getElementById('dxy-value').textContent = data.indicators.dxy.value;
                
                // Update EUR/USD
                document.getElementById('eurusd-value').textContent = data.indicators.eurusd.value;
                
                // Update Bitcoin
                document.getElementById('btc-value').textContent = `$${data.indicators.bitcoin.value.toLocaleString()}`;
                
            } catch (error) {
                console.error('Errore caricamento dati:', error);
                document.getElementById('loading').textContent = 
                    '❌ Errore caricamento dati. Riprova tra poco.';
            }
        }
        
        // Carica dati all'avvio
        loadData();
        
        // Refresh ogni 5 minuti
        setInterval(loadData, 300000);
    </script>
</body>
</html>
